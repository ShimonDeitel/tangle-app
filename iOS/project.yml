name: Tangle
options:
  bundleIdPrefix: com.shimondeitel.tangle
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tangle:
    type: application
    platform: iOS
    sources:
      - path: Tangle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tangle
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tangle/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TangleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TangleTests
      - path: Tangle.storekit
    dependencies:
      - target: Tangle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tangle.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tangle:
    build:
      targets:
        Tangle: all
        TangleTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tangle.storekit
    test:
      config: Debug
      storeKitConfiguration: Tangle.storekit
      targets:
        - TangleTests
    archive:
      config: Release
